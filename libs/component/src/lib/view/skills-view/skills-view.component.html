<lib-base-view [id]="id" [isSecondaryColor]="true">
  <lib-title-view value="Skills" [isMarginAuto]="true">
    <div class="skills" [ngClass]="getClassList()">
      <ng-container *ngFor="let skill of skills">
        <div class="skills__content">
          <lib-text-smart [isUppercase]="true">
            {{ skill.title }}
          </lib-text-smart>
          <div class="skills__technologies">
            <ng-container *ngFor="let technology of skill.technologies">
              <lib-skill-smart
                [skillTitle]="technology.title"
                [skillClassName]="technology.className"
                [isColored]="technology.colored"
                [isPrimaryColor]="!technology.colored"
              ></lib-skill-smart>
            </ng-container>
          </div>
        </div>
      </ng-container>
    </div>
  </lib-title-view>
</lib-base-view>
