<lib-base-view [id]="id">
  <lib-title-view value="Education">
    <div class="education-view">
      <ng-container *ngFor="let education of educations">
        <lib-education-item-smart
          [year]="education.year"
          [header]="education.header"
          [course]="education.course"
          [diploma]="education.diploma"
        ></lib-education-item-smart>
      </ng-container>
    </div>
  </lib-title-view>
</lib-base-view>
