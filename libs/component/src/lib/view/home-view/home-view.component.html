<lib-base-view [id]="id">
  <header class="home">
    <div class="home__content">
      <div class="home__avatar"></div>
      <lib-text-smart
        [isMediumSize]="true"
        [isLatterSpacing]="true"
        [isUppercase]="true"
      >
        {{ logo }}
      </lib-text-smart>
      <lib-text-smart
        [isSecondaryTextColor]="true"
        [isLatterSpacing]="true"
        [isUppercase]="true"
      >
        {{ profession }}
      </lib-text-smart>
    </div>
  </header>
</lib-base-view>
