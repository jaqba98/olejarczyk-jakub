<div class="menu" [ngClass]="{ menu__vertical: vertical }">
  <ng-container *ngFor="let option of getOptions()">
    <lib-button-smart
      [label]="getLabel(option)"
      [id]="option"
      [isPressed]="section === option"
      (event)="onClick($event)"
    ></lib-button-smart>
  </ng-container>
</div>
