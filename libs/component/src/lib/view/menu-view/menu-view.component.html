<div class="menu" [ngClass]="getClassList()">
  <ng-container *ngFor="let option of getOptions()">
    <lib-button-smart
      [label]="getLabel(option)"
      [id]="option"
      [isPressed]="getIsPressed(option)"
      [isFullWidth]="isFullWidth"
      (event)="onEvent($event)"
    ></lib-button-smart>
  </ng-container>
</div>
