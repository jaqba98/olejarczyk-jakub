<lib-base-view [id]="id">
  <lib-title-view value="Contact" [isMarginAuto]="true">
    <div class="contact-view">
      <ng-container *ngFor="let contact of contacts">
        <lib-contact-item-smart
          [icon]="contact.icon"
          [header]="contact.header"
          [label]="contact.label"
          [link]="contact.link"
        ></lib-contact-item-smart>
      </ng-container>
    </div>
  </lib-title-view>
</lib-base-view>
