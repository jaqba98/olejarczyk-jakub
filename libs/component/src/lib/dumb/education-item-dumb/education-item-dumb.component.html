<div class="education-item">
  <div class="education-item__logo">
    <lib-icon-dumb [icon]="faSchool" [isMediumSize]="true"></lib-icon-dumb>
    <lib-text-dumb [isTextCenter]="true" [isTinySize]="true">
      {{ year }}
    </lib-text-dumb>
  </div>
  <div class="education-item__content">
    <lib-text-dumb>{{ header }}</lib-text-dumb>
    <lib-text-dumb [isSecondaryTextColor]="true">{{ course }}</lib-text-dumb>
    <lib-text-dumb [isSecondaryTextColor]="true">{{ diploma }}</lib-text-dumb>
  </div>
</div>
