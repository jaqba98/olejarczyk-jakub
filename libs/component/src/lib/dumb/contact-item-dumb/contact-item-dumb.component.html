<div class="contact-item">
  <lib-icon-dumb [icon]="icon" [isMediumSize]="true"></lib-icon-dumb>
  <div class="contact-item__content">
    <lib-text-dumb [isUppercase]="true">
      {{ header }}
    </lib-text-dumb>
    <a [href]="link" target="_blank" class="contact-item__link">
      <lib-text-dumb [isSecondaryTextColor]="true">{{ label }}</lib-text-dumb>
    </a>
  </div>
</div>
