<div class="experience-item">
  <div class="experience-item__header">
    <div class="experience-item__logo">
      <lib-icon-dumb [icon]="faBuilding" [isMediumSize]="true"></lib-icon-dumb>
      <lib-text-dumb [isTextCenter]="true" [isTinySize]="true">
        {{ year }}
      </lib-text-dumb>
    </div>
    <div class="experience-item__content">
      <lib-text-dumb>{{ company }}</lib-text-dumb>
      <lib-text-dumb [isSecondaryTextColor]="true">
        {{ profession }}
      </lib-text-dumb>
    </div>
  </div>
  <ul class="experience-item__list">
    <ng-container *ngFor="let task of tasks">
      <li>
        <lib-text-smart>{{ task }}</lib-text-smart>
      </li>
    </ng-container>
  </ul>
</div>
